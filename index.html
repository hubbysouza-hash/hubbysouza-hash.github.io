<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churrascaria Gaucho - Pedido via WhatsApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-green { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 50% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-red-50 min-h-screen">
    <div id="app"></div>

    <script>
        // ====== Utilitários ======
        const WHATSAPP_NUMBER = "5511939426652"; // Número para delivery
        const ADMIN_PASSWORD = "170183mf";
        const LS_MENU_KEY = "menuData-v1";

        function currency(v) {
            if (typeof v !== "number" || isNaN(v)) return "R$ 0,00";
            return v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
        }

        function encodeWhatsAppText(text) {
            return encodeURIComponent(text);
        }

        // ====== Dados Padrão ======
        const defaultMenu = [
            {
                id: "cat-marmitex",
                name: "MARMITEX",
                products: [
                    { id: "m1", name: "Costela no Bafo", sizes: { P: 28.0, G: 32.0 } },
                    { id: "m2", name: "Brisket", sizes: { P: 28.0, G: 32.0 } },
                    { id: "m3", name: "Fraldinha Texana", sizes: { P: 28.0, G: 32.0 } },
                    { id: "m4", name: "Filé de frango grelhado", sizes: { P: 20.0, G: 23.0 } },
                    { id: "m5", name: "Calabresa acebolada", sizes: { P: 23.0, G: 26.0 } },
                    { id: "m6", name: "Bife em tiras com fritas", sizes: { P: 26.0, G: 28.0 } },
                    { id: "m7", name: "Bife acebolado", sizes: { P: 26.0, G: 28.0 } },
                    { id: "m8", name: "Omelete (Tomate, Cebola e queijo)", sizes: { P: 22.0, G: 25.0 } },
                    { id: "m9", name: "Filé de frango à milanesa", sizes: { P: 23.0, G: 27.0 } },
                    { id: "m10", name: "Bife à milanesa", sizes: { P: 27.0, G: 30.0 } },
                    { id: "m11", name: "Parmegiana de frango", sizes: { P: 26.0, G: 28.0 } },
                    { id: "m12", name: "Parmegiana de carne", sizes: { P: 29.0, G: 32.0 } },
                    { id: "m13", name: "Frango Assado", sizes: { P: 23.0, G: 26.0 } },
                    { id: "m14", name: "Linguiça", sizes: { P: 23.0, G: 26.0 } },
                ],
            },
            {
                id: "cat-porcao",
                name: "PORÇÃO",
                products: [
                    { id: "p1", name: "Pão com Carne", price: 15.0 },
                    { id: "p2", name: "Contra Filé", price: 60.0 },
                ],
            },
            {
                id: "cat-feijoada",
                name: "FEIJOADA LIGHT",
                description: "Todos os Sábados – Acompanha Farofa, Couve e Torresmo, vinagrete, bisteca, banana, gomo de laranja, molho de pimenta e caipirinha",
                products: [
                    { id: "f1", name: "Feijoada Light (sábados)", sizes: { P: 35.0, M: 65.0, G: 95.0 } },
                ],
            },
            {
                id: "cat-massas",
                name: "MASSAS ITALIANA",
                products: [
                    { id: "i1", name: "Rondelli Presunto e Queijo", price: 30.0 },
                    { id: "i2", name: "Rondelli Verde 4 Queijos", price: 31.5 },
                    { id: "i3", name: "Torttelli Amarelo Bacon e Creanchees", price: 31.5 },
                    { id: "i4", name: "Capeletti de Carne", price: 28.0 },
                    { id: "i5", name: "Raviolli Branco Mussarela", price: 28.0 },
                    { id: "i6", name: "Pastelzinho de Carne e Queijo (6 un)", price: 20.0 },
                    { id: "i7", name: "Sorrentino Presunto e Mussarela", price: 30.0 },
                    { id: "i8", name: "Conchigliione 5 Queijos", price: 31.5 },
                    { id: "i9", name: "Nhoque de Batata", price: 25.0 },
                ],
            },
            {
                id: "cat-bebidas",
                name: "BEBIDAS",
                products: [
                    { id: "b1", name: "Refrigerante Lata", price: 6.0 },
                    { id: "b2", name: "Refrigerante 2L", price: 12.0 },
                    { id: "b3", name: "Água Mineral", price: 4.0 },
                    { id: "b4", name: "Suco de Polpa", sizes: { "500ml": 12.0, "1L": 17.0 } },
                    { id: "b5", name: "Coca Cola", sizes: { "Lata": 6.0, "600ml": 9.0, "2L": 15.0 } },
                    { id: "b6", name: "Cerveja Long Neck", price: 7.0 },
                ],
            },
        ];

        // ====== Estado da Aplicação ======
        let state = {
            currentView: "menu",
            cart: [],
            customerInfo: { name: "", phone: "", address: "", paymentMethod: "", deliveryLocation: "" },
            menu: JSON.parse(localStorage.getItem(LS_MENU_KEY)) || defaultMenu,
            isAdmin: false,
        };

        // ====== Funções do Carrinho ======
        function addToCart(productId, categoryId, size = null) {
            const category = state.menu.find(c => c.id === categoryId);
            const product = category.products.find(p => p.id === productId);

            const price = size ? product.sizes[size] : product.price;
            const itemName = size ? `${product.name} (${size})` : product.name;

            const cartItem = {
                id: `${productId}-${size || 'default'}-${Date.now()}`,
                productId,
                categoryId,
                name: itemName,
                price,
                quantity: 1,
                size
            };

            state.cart.push(cartItem);
            render();
        }

        function removeFromCart(itemId) {
            state.cart = state.cart.filter(item => item.id !== itemId);
            render();
        }

        function updateQuantity(itemId, newQuantity) {
            if (newQuantity <= 0) {
                removeFromCart(itemId);
                return;
            }
            const item = state.cart.find(item => item.id === itemId);
            if (item) {
                item.quantity = newQuantity;
                render();
            }
        }

        function getCartTotal() {
            return state.cart.reduce((total, item) => total + (item.price * item.quantity), 0);
        }

        function getDeliveryFee() {
            const location = state.customerInfo.deliveryLocation;
            const fees = {
                "Vargem Grande": 3.0,
                "Colonia": 5.0,
                "Silveira": 5.0,
                "Parelheiros": 10.0,
                "Jd Silveira": 15.0,
                "Outros": 25.0
            };
            return fees[location] || 0;
        }

        function getFinalTotal() {
            return getCartTotal() + getDeliveryFee();
        }

        // ====== Funções do WhatsApp ======
        function sendWhatsAppOrder() {
            if (state.cart.length === 0) {
                alert("Seu carrinho está vazio!");
                return;
            }

            if (!state.customerInfo.name || !state.customerInfo.phone || !state.customerInfo.paymentMethod || !state.customerInfo.deliveryLocation) {
                alert("Por favor, preencha seu nome, telefone, forma de pagamento e localização para entrega!");
                return;
            }

            let message = `🍖 *PEDIDO - CHURRASCARIA GAUCHO* 🍖\n\n`;
            message += `👤 *Cliente:* ${state.customerInfo.name}\n`;
            message += `📱 *Telefone:* ${state.customerInfo.phone}\n`;
            if (state.customerInfo.address) {
                message += `📍 *Endereço:* ${state.customerInfo.address}\n`;
            }
            message += `💳 *Forma de Pagamento:* ${state.customerInfo.paymentMethod}\n`;
            message += `🚚 *Local de Entrega:* ${state.customerInfo.deliveryLocation}\n`;
            message += `\n📋 *ITENS DO PEDIDO:*\n`;

            state.cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} - Qtd: ${item.quantity} - ${currency(item.price * item.quantity)}\n`;
            });

            const deliveryFee = getDeliveryFee();
            message += `\n💰 *Subtotal: ${currency(getCartTotal())}*\n`;
            if (deliveryFee > 0) {
                message += `🚚 *Taxa de Entrega: ${currency(deliveryFee)}*\n`;
            }
            message += `💰 *TOTAL FINAL: ${currency(getFinalTotal())}*\n\n`;
            message += `Obrigado pela preferência! 🙏`;

            const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeWhatsAppText(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        // ====== Componentes de Renderização ======
        function renderHeader() {
            return `
                <header class="bg-gradient-to-r from-red-600 to-orange-600 text-white shadow-lg">
                    <div class="container mx-auto px-4 py-6">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <div class="text-3xl">🥩</div>
                                <div>
                                    <h1 class="text-2xl font-bold">Churrascaria Gaucho</h1>
                                    <p class="text-red-100">Sabor autêntico do Sul</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-4">
                                <button onclick="toggleCart()" class="relative bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition-colors">
                                    🛒 Carrinho
                                    ${state.cart.length > 0 ? `<span class="absolute -top-2 -right-2 bg-yellow-400 text-red-800 text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center">${state.cart.length}</span>` : ''}
                                </button>
                                <button onclick="toggleAdmin()" class="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg transition-colors text-sm">
                                    ⚙️
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            `;
        }

        function renderMenu() {
            return `
                <div class="container mx-auto px-4 py-8">
                    <div class="grid gap-8">
                        ${state.menu.map(category => `
                            <div class="bg-white rounded-xl shadow-lg overflow-hidden fade-in">
                                <div class="bg-gradient-to-r from-red-500 to-orange-500 text-white p-6">
                                    <h2 class="text-2xl font-bold">${category.name}</h2>
                                    ${category.description ? `<p class="text-red-100 mt-2">${category.description}</p>` : ''}
                                </div>
                                <div class="p-6">
                                    <div class="grid gap-4">
                                        ${category.products.map(product => `
                                            <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                                                <div class="flex justify-between items-start">
                                                    <div class="flex-1">
                                                        <h3 class="font-semibold text-gray-800">${product.name}</h3>
                                                        ${product.sizes ? `
                                                            <div class="mt-3 flex flex-wrap gap-2">
                                                                ${Object.entries(product.sizes).map(([size, price]) => `
                                                                    <button onclick="addToCart('${product.id}', '${category.id}', '${size}')"
                                                                            class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                                                                        ${size} - ${currency(price)}
                                                                    </button>
                                                                `).join('')}
                                                            </div>
                                                        ` : `
                                                            <div class="mt-3 flex justify-between items-center">
                                                                <span class="text-xl font-bold text-red-600">${currency(product.price)}</span>
                                                                <button onclick="addToCart('${product.id}', '${category.id}')"
                                                                        class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                                                                    Adicionar
                                                                </button>
                                                            </div>
                                                        `}
                                                    </div>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderCart() {
            if (state.cart.length === 0) {
                return `
                    <div class="container mx-auto px-4 py-8">
                        <div class="bg-white rounded-xl shadow-lg p-8 text-center">
                            <div class="text-6xl mb-4">🛒</div>
                            <h2 class="text-2xl font-bold text-gray-800 mb-2">Carrinho Vazio</h2>
                            <p class="text-gray-600 mb-6">Adicione alguns itens deliciosos ao seu pedido!</p>
                            <button onclick="state.currentView = 'menu'; render()"
                                    class="bg-red-500 hover:bg-red-600 text-white px-8 py-3 rounded-lg font-medium transition-colors">
                                Ver Cardápio
                            </button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="container mx-auto px-4 py-8">
                    <div class="grid lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2">
                            <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                                <div class="bg-gradient-to-r from-red-500 to-orange-500 text-white p-6">
                                    <h2 class="text-2xl font-bold">Seu Pedido</h2>
                                </div>
                                <div class="p-6">
                                    <div class="space-y-4">
                                        ${state.cart.map(item => `
                                            <div class="flex items-center justify-between p-4 border border-gray-200 rounded-lg">
                                                <div class="flex-1">
                                                    <h3 class="font-semibold text-gray-800">${item.name}</h3>
                                                    <p class="text-red-600 font-bold">${currency(item.price)}</p>
                                                </div>
                                                <div class="flex items-center space-x-3">
                                                    <button onclick="updateQuantity('${item.id}', ${item.quantity - 1})"
                                                            class="w-8 h-8 bg-gray-200 hover:bg-gray-300 rounded-full flex items-center justify-center transition-colors">
                                                        -
                                                    </button>
                                                    <span class="font-semibold w-8 text-center">${item.quantity}</span>
                                                    <button onclick="updateQuantity('${item.id}', ${item.quantity + 1})"
                                                            class="w-8 h-8 bg-gray-200 hover:bg-gray-300 rounded-full flex items-center justify-center transition-colors">
                                                        +
                                                    </button>
                                                    <button onclick="removeFromCart('${item.id}')"
                                                            class="w-8 h-8 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center transition-colors ml-2">
                                                        ×
                                                    </button>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div class="mt-6 pt-6 border-t border-gray-200">
                                        <div class="space-y-2">
                                            <div class="flex justify-between items-center">
                                                <span class="font-semibold">Subtotal:</span>
                                                <span class="text-red-600 font-bold">${currency(getCartTotal())}</span>
                                            </div>
                                            ${getDeliveryFee() > 0 ? `
                                                <div class="flex justify-between items-center">
                                                    <span class="font-semibold">Taxa de Entrega:</span>
                                                    <span class="text-red-600 font-bold">${currency(getDeliveryFee())}</span>
                                                </div>
                                            ` : ''}
                                            <div class="flex justify-between items-center text-xl font-bold pt-2 border-t border-gray-200">
                                                <span>Total Final:</span>
                                                <span class="text-red-600">${currency(getFinalTotal())}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="lg:col-span-1">
                            <div class="bg-white rounded-xl shadow-lg p-6">
                                <h3 class="text-xl font-bold mb-4">Dados para Entrega</h3>
                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Nome *</label>
                                        <input type="text" value="${state.customerInfo.name}"
                                               onchange="state.customerInfo.name = this.value"
                                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500"
                                               placeholder="Seu nome completo">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Telefone *</label>
                                        <input type="tel" value="${state.customerInfo.phone}"
                                               onchange="state.customerInfo.phone = this.value"
                                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500"
                                               placeholder="(11) 99999-9999">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Localização para Entrega *</label>
                                        <select value="${state.customerInfo.deliveryLocation}"
                                                onchange="state.customerInfo.deliveryLocation = this.value; render()"
                                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500">
                                            <option value="">Selecione sua localização</option>
                                            <option value="Vargem Grande">Vargem Grande - R$ 3,00</option>
                                            <option value="Colonia">Colonia - R$ 5,00</option>
                                            <option value="Silveira">Silveira - R$ 5,00</option>
                                            <option value="Parelheiros">Parelheiros - R$ 10,00</option>
                                            <option value="Jd Silveira">Jd Silveira - R$ 15,00</option>
                                            <option value="Outros">Outros - R$ 25,00</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Endereço Completo</label>
                                        <textarea value="${state.customerInfo.address}"
                                                  onchange="state.customerInfo.address = this.value"
                                                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500"
                                                  rows="3" placeholder="Rua, número, complemento..."></textarea>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Forma de Pagamento *</label>
                                        <div class="grid grid-cols-2 gap-2">
                                            <button onclick="selectPayment('PIX')"
                                                    class="payment-btn ${state.customerInfo.paymentMethod === 'PIX' ? 'bg-green-500 text-white' : 'bg-gray-100 hover:bg-gray-200'} p-3 rounded-lg border transition-colors text-center">
                                                <div class="text-lg">📱</div>
                                                <div class="text-sm font-medium">PIX</div>
                                            </button>
                                            <button onclick="selectPayment('Dinheiro')"
                                                    class="payment-btn ${state.customerInfo.paymentMethod === 'Dinheiro' ? 'bg-green-500 text-white' : 'bg-gray-100 hover:bg-gray-200'} p-3 rounded-lg border transition-colors text-center">
                                                <div class="text-lg">💵</div>
                                                <div class="text-sm font-medium">Dinheiro</div>
                                            </button>
                                            <button onclick="selectPayment('Cartão de Débito')"
                                                    class="payment-btn ${state.customerInfo.paymentMethod === 'Cartão de Débito' ? 'bg-green-500 text-white' : 'bg-gray-100 hover:bg-gray-200'} p-3 rounded-lg border transition-colors text-center">
                                                <div class="text-lg">💳</div>
                                                <div class="text-sm font-medium">Débito</div>
                                            </button>
                                            <button onclick="selectPayment('Cartão de Crédito')"
                                                    class="payment-btn ${state.customerInfo.paymentMethod === 'Cartão de Crédito' ? 'bg-green-500 text-white' : 'bg-gray-100 hover:bg-gray-200'} p-3 rounded-lg border transition-colors text-center">
                                                <div class="text-lg">💳</div>
                                                <div class="text-sm font-medium">Crédito</div>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <button onclick="sendWhatsAppOrder()"
                                        class="w-full mt-6 bg-green-500 hover:bg-green-600 text-white py-4 rounded-lg font-bold text-lg transition-colors pulse-green">
                                    📱 Enviar Pedido via WhatsApp
                                </button>

                                <button onclick="state.currentView = 'menu'; render()"
                                        class="w-full mt-3 bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg font-medium transition-colors">
                                    Continuar Comprando
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ====== Funções de Navegação ======
        function selectPayment(method) {
            state.customerInfo.paymentMethod = method;
            render();
        }

        function toggleCart() {
            state.currentView = state.currentView === 'cart' ? 'menu' : 'cart';
            render();
        }

        function toggleAdmin() {
            if (!state.isAdmin) {
                const password = prompt("Digite a senha de administrador:");
                if (password === ADMIN_PASSWORD) {
                    state.isAdmin = true;
                    alert("Modo administrador ativado!");
                } else {
                    alert("Senha incorreta!");
                    return;
                }
            } else {
                state.isAdmin = false;
                alert("Modo administrador desativado!");
            }
            render();
        }

        // ====== Função Principal de Renderização ======
        function render() {
            const app = document.getElementById('app');

            let content = renderHeader();

            if (state.currentView === 'menu') {
                content += renderMenu();
            } else if (state.currentView === 'cart') {
                content += renderCart();
            }

            if (state.isAdmin) {
                content += `
                    <div class="fixed bottom-4 right-4 bg-yellow-400 text-black p-3 rounded-lg shadow-lg">
                        <strong>Modo Admin Ativo</strong>
                    </div>
                `;
            }

            app.innerHTML = content;
        }

        // ====== Inicialização ======
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
